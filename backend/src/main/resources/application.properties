# ============================================================
# Sahasathi Backend - Application Configuration
# ============================================================

# Firebase
# Place your firebase-service-account.json in src/main/resources/
firebase.config-path=classpath:firebase-service-account.json

# Active Profile (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application
spring.application.name=sahasathi-backend
server.port=${SERVER_PORT:8080}

# ============================================================
# Database Configuration (overridden per profile)
# ============================================================
# See application-dev.properties and application-prod.properties

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads/profile-pictures}

# ============================================================
# Logging
# ============================================================
logging.level.com.sahasathi=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
